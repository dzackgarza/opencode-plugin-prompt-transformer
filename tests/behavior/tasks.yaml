---
# Behavioral test task definitions for the opencode-plugin-prompt-transformer plugin.
#
# Each task triggers one tier and elicits observable behavioral signals.
# Tasks use the /var/sandbox/ codebase (sindresorhus/execa + synthetic
# lib/arguments/parser.js module containing an A-tier bug).
#
# Faux-rules prompts (marked faux_rule: true) bypass the LLM classifier —
# the tier is matched deterministically in FAUX_RULES in the opencode-plugin-prompt-transformer example.

tasks:

  - tier: model-self
    prompt: >
      Describe every tool you have access to.
    faux_rule: true
    expected_behaviors:
      - Answers directly from context (session instructions, tool list)
      - Makes zero tool calls before answering
      - Does not spawn subagents
      - Response is a structured summary of available tools
    success_criteria: "Zero tool calls before responding"
    timeout_seconds: 30

  - tier: knowledge
    prompt: >
      What is the latest stable release of Node.js, and does it support the
      Web Crypto API natively without any flags?
    faux_rule: false
    expected_behaviors:
      - Makes at least one web search (kindly_web_search) or context7 lookup
        before stating a version number
      - Does not answer immediately from training data
      - Cites sources in the response
      - Does not open with "As of my knowledge cutoff..."
    success_criteria: "At least one search tool call before any answer text"
    timeout_seconds: 90

  - tier: C
    prompt: >
      In `lib/arguments/parser.js` line 22, rename the parameter `args` to
      `argumentList` and update its one usage on the same line.
    faux_rule: false
    expected_behaviors:
      - Makes a single targeted edit (no TodoWrite for a 1-step task)
      - Does not read unrelated files
      - Does not add scope beyond the rename
      - Does not ask clarifying questions
      - Completes in under 5 tool calls
    success_criteria: "Edit applied to line 22 only; no TodoWrite"
    timeout_seconds: 60

  - tier: B
    prompt: >
      Add a JSDoc comment to every exported function in `lib/arguments/specific.js`.
    faux_rule: false
    expected_behaviors:
      - Creates TodoWrite listing each exported function before editing
      - Reads the file to enumerate exports before starting
      - Applies JSDoc uniformly to each export
      - Does not make per-function judgment calls about style
      - Marks each todo item complete after editing
    success_criteria: "TodoWrite with 4+ items; JSDoc added to each exported function"
    timeout_seconds: 180

  - tier: A
    prompt: >
      The test `should handle empty input` in `test/arguments/parser.test.js`
      is failing. Figure out why and fix it.
    faux_rule: false
    expected_behaviors:
      - Reads the test file before making any code changes
      - Reads lib/arguments/parser.js to trace the root cause
      - States the root cause explicitly before proposing any fix
      - Does not monkey-patch (apply surface-level workaround)
      - First edit happens after stated findings, not before
    success_criteria: >
      At least 2 file reads before first edit; explicit root cause statement
      present in output before fix is applied
    timeout_seconds: 300

  - tier: S
    prompt: >
      Design a plugin for tracking token usage per session.
    faux_rule: true
    expected_behaviors:
      - Creates a TodoWrite scoping list (questions to answer, context to gather)
      - Does not write any code
      - Does not produce a partial implementation in chat
      - Works through the scoping list (reads relevant files, identifies deps)
      - Ends with handoff message asking user to switch to plan mode
    success_criteria: >
      TodoWrite created; no code written; response ends with plan-mode handoff
    timeout_seconds: 90
